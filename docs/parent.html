<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#6366f1" />
  <title>設定 | お手伝いクエスト</title>
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
</head>
<body>
  <header class="app-header">
    <h1><span class="emoji">⚙️</span>設定</h1>
    <nav>
      <a href="./index.html">今日</a>
      <a href="./record.html">記録</a>
      <a href="./parent.html" class="active">設定</a>
    </nav>
  </header>
  <main class="app-main">
    <section class="panel">
      <h2>タスクを追加</h2>
      <div class="field">
        <label>タスク名</label>
        <input id="f-title" placeholder="例: 数学の宿題" />
      </div>
      <div class="row">
        <div class="field">
          <label>アイコン</label>
          <input id="f-icon" placeholder="📚" />
        </div>
        <div class="field">
          <label>ポイント</label>
          <input id="f-points" type="number" value="10" min="0" />
        </div>
      </div>
      <div class="field">
        <label>種類</label>
        <select id="f-kind">
          <option value="routine">定番（毎週この曜日）</option>
          <option value="spot">スポット（この日だけ）</option>
        </select>
      </div>
      <div class="field" id="days-field">
        <label>曜日（定番）</label>
        <div class="days-pick" id="f-days"></div>
      </div>
      <div class="field" id="date-field" hidden>
        <label>日付（スポット）</label>
        <input id="f-date" type="date" />
      </div>
      <button class="btn" id="f-add">追加する</button>
      <p id="f-msg" class="level-sub"></p>
    </section>

    <section class="panel">
      <h2>定番タスク</h2>
      <div id="routine-list"></div>
    </section>

    <section class="panel">
      <h2>スポットタスク（今後の予定）</h2>
      <div id="spot-list"></div>
    </section>

    <section class="panel">
      <h2>名前・テーマカラー</h2>
      <div id="child-edit"></div>
    </section>

    <section class="panel">
      <h2>データのバックアップ</h2>
      <p class="level-sub">
        記録はこの端末の中に保存されています。端末を変えるときや、
        念のための保存に「書き出し」を使ってください。
      </p>
      <div class="row">
        <button class="btn" id="backup-export">書き出し（保存）</button>
        <button class="btn" id="backup-import">読み込み（復元）</button>
      </div>
      <input type="file" id="backup-file" accept="application/json,.json" hidden />
      <p id="backup-msg" class="level-sub"></p>
    </section>
  </main>

  <script type="module" src="./js/parent.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
